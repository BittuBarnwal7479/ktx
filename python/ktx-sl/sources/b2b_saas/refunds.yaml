name: refunds
table: refunds
grain:
- refund_id
columns:
- name: refund_id
  type: number
- name: amount
  type: number
- name: charge_id
  type: number
- name: created_at
  type: time
  role: time
- name: reason
  type: string
joins:
- to: charges
  'on': charge_id = charges.charge_id
  relationship: many_to_one
