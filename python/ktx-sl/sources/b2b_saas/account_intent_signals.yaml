name: account_intent_signals
table: account_intent_signals
grain:
- signal_id
columns:
- name: signal_id
  type: number
- name: account_id
  type: number
- name: signal_date
  type: time
  role: time
- name: topic
  type: string
joins:
- to: accounts
  'on': account_id = accounts.account_id
  relationship: many_to_one
