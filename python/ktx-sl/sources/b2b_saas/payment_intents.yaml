name: payment_intents
table: payment_intents
grain:
- payment_intent_id
columns:
- name: payment_intent_id
  type: number
- name: amount
  type: number
- name: created_at
  type: time
  role: time
- name: currency
  type: string
- name: invoice_id
  type: number
- name: status
  type: string
joins:
- to: invoices
  'on': invoice_id = invoices.invoice_id
  relationship: many_to_one
