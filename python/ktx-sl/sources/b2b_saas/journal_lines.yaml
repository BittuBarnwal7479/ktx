name: journal_lines
table: journal_lines
grain:
- journal_line_id
columns:
- name: journal_line_id
  type: number
- name: amount
  type: number
- name: dr_cr
  type: string
- name: gl_account_id
  type: number
- name: journal_entry_id
  type: number
joins:
- to: gl_accounts
  'on': gl_account_id = gl_accounts.gl_account_id
  relationship: many_to_one
- to: accounts
  'on': gl_account_id = accounts.account_id
  relationship: many_to_one
- to: journal_entries
  'on': journal_entry_id = journal_entries.journal_entry_id
  relationship: many_to_one
