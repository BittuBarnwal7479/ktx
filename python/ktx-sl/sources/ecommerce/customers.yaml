name: customers
table: public.customers
grain: [id]
columns:
  - name: id
    type: number
  - name: name
    type: string
  - name: segment
    type: string
  - name: region_id
    type: number
  - name: created_at
    type: time
    role: time
joins:
  - to: regions
    "on": region_id = regions.id
    relationship: many_to_one
