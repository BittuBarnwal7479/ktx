name: supplier
table: public.supplier
grain: [s_suppkey]
columns:
  - name: s_suppkey
    type: number
  - name: s_name
    type: string
  - name: s_address
    type: string
  - name: s_nationkey
    type: number
  - name: s_phone
    type: string
  - name: s_acctbal
    type: number
  - name: s_comment
    type: string
joins:
  - to: nation
    "on": s_nationkey = nation.n_nationkey
    relationship: many_to_one
